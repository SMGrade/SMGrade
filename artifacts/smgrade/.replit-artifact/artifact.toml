kind = "web"
previewPath = "/"
title = "SMGrade"
version = "1.0.0"
id = "artifacts/smgrade"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23994

[services.development]
run = "pnpm --filter @workspace/smgrade run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smgrade", "run", "build" ]
publicDir = "artifacts/smgrade/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23994"
BASE_PATH = "/"
